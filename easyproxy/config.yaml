name: "EasyProxy"
description: "EasyProxy per Home Assistant: proxy HLS/M3U8/IPTV"
version: "1.0.3"
slug: "easyproxy"
init: false

arch:
  - aarch64
  - amd64

ports:
  7860/tcp: 7860
ports_description:
  7860/tcp: "Web Interface & API"

options:
  api_password: "cambiami"
  port: 7860
  mpd_mode: "legacy"
  log_level: "WARNING"
  dvr_enabled: false
  global_proxy: ""
  transport_routes: ""

schema:
  api_password: str
  port: int
  mpd_mode: list(ffmpeg|legacy)
  log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)
  dvr_enabled: bool
  global_proxy: str
  transport_routes: str

map:
  - share:rw

ingress: true
ingress_port: 7860
panel_icon: "mdi:television-play"
panel_title: "EasyProxy"
